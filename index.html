<!doctype html>
<html lang="mr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>बचतकिया — व्यापारी ॲप (Merchant App)</title>
<meta name="description" content="Bachatkiya merchant app - swipe through 6 Marathi screens: billing, UPI QR, and instant cashback into the customer's bachat account.">
<meta property="og:type" content="website">
<meta property="og:title" content="बचतकिया — व्यापारी ॲप (Merchant App)">
<meta property="og:description" content="Swipe through the 6-screen Marathi merchant-app mockup.">
<meta property="og:image" content="https://ganeshyala.github.io/bachatkiya-web/bachatkiya-1-dashboard.png">
<meta name="theme-color" content="#0b5e44">
<style>
  :root{
    --green:#0b5e44; --green-600:#0e7c5a; --ink:#13221b; --muted:#6a7c73;
    --font:"Nirmala UI","Kohinoor Devanagari","Noto Sans Devanagari","Mangal",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:var(--font); color:var(--ink); background:#ffffff;
    height:100vh; height:100dvh; overflow:hidden;
    -webkit-font-smoothing:antialiased; -webkit-tap-highlight-color:transparent;
  }
  .stage{display:flex;flex-direction:column;height:100vh;height:100dvh}
  .topbar{
    flex:0 0 auto; background:linear-gradient(90deg,var(--green),var(--green-600));
    color:#fff; display:flex; align-items:center; justify-content:space-between;
    padding:12px 18px; padding-top:max(12px,env(safe-area-inset-top));
  }
  .brand{font-weight:800; font-size:16px; letter-spacing:.2px}
  .brand small{font-weight:600; opacity:.8; font-size:12px; margin-left:6px}
  .count{font-weight:700; font-size:14px; font-variant-numeric:tabular-nums; background:rgba(255,255,255,.16); padding:4px 11px; border-radius:999px}
  .viewer{
    flex:1; min-height:0; position:relative; display:grid; place-items:center;
    padding:12px; overflow:hidden; user-select:none; touch-action:pan-y;
  }
  img#shot{
    max-width:100%; max-height:100%; object-fit:contain; display:block;
    transition:opacity .18s ease;
  }
  body.swapping img#shot{opacity:0}
  .nav{
    position:absolute; top:50%; transform:translateY(-50%);
    width:46px; height:46px; border-radius:50%; border:none; cursor:pointer;
    background:rgba(11,94,68,.9); color:#fff; font-size:26px; line-height:1;
    display:grid; place-items:center; box-shadow:0 6px 16px rgba(8,40,30,.28);
  }
  .nav:active{transform:translateY(-50%) scale(.94)}
  .nav.prev{left:10px} .nav.next{right:10px}
  .nav:focus-visible{outline:3px solid #7cc3a8; outline-offset:2px}
  .bottom{
    flex:0 0 auto; text-align:center; padding:12px 16px;
    padding-bottom:max(14px,env(safe-area-inset-bottom));
  }
  .label{font-weight:700; font-size:15px; margin-bottom:10px}
  .label .en{color:var(--muted); font-weight:600}
  .dots{display:flex; gap:7px; justify-content:center; margin-bottom:9px}
  .dot{width:8px; height:8px; border-radius:999px; background:#cfe0d7; cursor:pointer; transition:all .2s}
  .dot.active{width:22px; background:var(--green)}
  .hint{font-size:11.5px; color:var(--muted)}
  @media (prefers-reduced-motion:reduce){ *{transition:none!important} }
</style>
</head>
<body>
  <div class="stage">
    <div class="topbar">
      <span class="brand">बचतकिया<small>व्यापारी ॲप</small></span>
      <span class="count"><span id="cur">1</span> / 6</span>
    </div>
    <div class="viewer" id="viewer">
      <button class="nav prev" id="prev" aria-label="मागील">‹</button>
      <img id="shot" src="bachatkiya-1-dashboard.png" alt="screen">
      <button class="nav next" id="next" aria-label="पुढील">›</button>
    </div>
    <div class="bottom">
      <div class="label" id="label"></div>
      <div class="dots" id="dots"></div>
      <div class="hint">स्वाइप करा किंवा बाण वापरा · Swipe or use arrows</div>
    </div>
  </div>
<script>
(function(){
  var SCREENS=[
    {src:'bachatkiya-1-dashboard.png', mr:'डॅशबोर्ड', en:'Dashboard'},
    {src:'bachatkiya-2-bill.png',      mr:'नवीन बिल', en:'Create Bill'},
    {src:'bachatkiya-3-qr.png',        mr:'UPI QR पेमेंट', en:'UPI QR Payment'},
    {src:'bachatkiya-4-success.png',   mr:'पेमेंट यशस्वी', en:'Payment Success'},
    {src:'bachatkiya-5-wallet.png',    mr:'ठेव वॉलेट', en:'Deposit Wallet'},
    {src:'bachatkiya-6-enroll.png',    mr:'ग्राहक नोंदणी', en:'Enroll Customer'}
  ];
  SCREENS.forEach(function(s){ var i=new Image(); i.src=s.src; });
  var i=0, img=document.getElementById('shot'), cur=document.getElementById('cur'),
      label=document.getElementById('label'), dotsEl=document.getElementById('dots');
  SCREENS.forEach(function(s,idx){
    var d=document.createElement('span'); d.className='dot'+(idx===0?' active':'');
    d.addEventListener('click',function(){ go(idx); });
    dotsEl.appendChild(d);
  });
  var dots=dotsEl.children;
  function render(){
    var s=SCREENS[i];
    document.body.classList.add('swapping');
    setTimeout(function(){
      img.src=s.src; img.alt=s.mr+' — '+s.en;
      document.body.classList.remove('swapping');
    },120);
    cur.textContent=i+1;
    label.innerHTML=s.mr+' <span class="en">· '+s.en+'</span>';
    for(var k=0;k<dots.length;k++){ dots[k].className='dot'+(k===i?' active':''); }
  }
  function go(n){ i=(n+SCREENS.length)%SCREENS.length; render(); }
  function next(){ go(i+1); } function prev(){ go(i-1); }
  document.getElementById('next').addEventListener('click',next);
  document.getElementById('prev').addEventListener('click',prev);
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight') next(); else if(e.key==='ArrowLeft') prev();
  });
  var vw=document.getElementById('viewer'), sx=0, sy=0, tracking=false;
  vw.addEventListener('touchstart',function(e){ var t=e.changedTouches[0]; sx=t.clientX; sy=t.clientY; tracking=true; },{passive:true});
  vw.addEventListener('touchend',function(e){
    if(!tracking) return; tracking=false;
    var t=e.changedTouches[0], dx=t.clientX-sx, dy=t.clientY-sy;
    if(Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)){ if(dx<0) next(); else prev(); }
  },{passive:true});
  // click left/right third to navigate (ignores the arrow buttons themselves)
  vw.addEventListener('click',function(e){
    if(e.target.closest('.nav')) return;
    var r=vw.getBoundingClientRect(), x=e.clientX-r.left;
    if(x < r.width*0.33) prev(); else if(x > r.width*0.67) next();
  });
  render();
})();
</script>
</body>
</html>
